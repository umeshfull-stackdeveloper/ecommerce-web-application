<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Next-Gen Production Grade Multi-Vendor E-Commerce Portal Hub featuring micro-interactions and instant sandboxed transactions." />
    <title>NEXUS - Multi-Vendor Marketplace</title>
  </head>
  <body class="bg-[#f8fafc] text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (const registration of registrations) {
              registration.unregister().then((success) => {
                if (success) console.log('👷 PWA SW: Successfully unregistered service worker on localhost');
              });
            }
          });
        }
      } else if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('👷 PWA SW: Registered successfully', reg.scope))
            .catch((err) => console.warn('👷 PWA SW: Registration failed', err));
        });
      }
    </script>
  </body>
</html>
